<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcadores</title>
    <link rel="manifest" href="manifest.json">

    <link rel="icon" href="icono.jpg" type="image/jpeg">

    <!-- Compatibilidad con iOS (Safari) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="marcadores">
    <link rel="apple-touch-icon" href="icono.jpg">  
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
      :root {
        --bg:          #f0f2f5;
        --surface:     #ffffff;
        --surface-2:   #f7f8fa;
        --border:      #e2e5ea;
        --border-2:    #d0d4db;
        --text:        #111318;
        --text-sub:    #4a5060;
        --text-hint:   #8a909e;
        --accent:      #3b6ef8;
        --accent-soft: #eef1ff;
        --accent-2:    #2554d4;
        --danger:      #e03e3e;
        --danger-soft: #fff0f0;
        --radius:      12px;
        --radius-sm:   8px;
        --radius-xs:   5px;
        --shadow:      0 1px 4px rgba(0,0,0,0.07), 0 2px 12px rgba(0,0,0,0.04);
        --shadow-md:   0 4px 20px rgba(0,0,0,0.10);
        --topbar-h:    58px;
        --busqueda-h:  48px;
        --chips-h:     48px;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

      #topbar {
        position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h);
        background: var(--surface); border-bottom: 1px solid var(--border);
        display: flex; align-items: center; gap: 10px; padding: 0 16px;
        z-index: 100; box-shadow: 0 1px 8px rgba(0,0,0,0.06);
      }
      #topbar-logo { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; white-space: nowrap; flex-shrink: 0; }
      #busqueda-bar {
        position: fixed; top: var(--topbar-h); left: 0; right: 0;
        height: 48px; background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex; align-items: center; gap: 8px;
        padding: 0 16px; z-index: 98;
      }
      #busqueda-bar svg { color: var(--text-hint); flex-shrink: 0; }
      #busqueda {
        flex: 1; padding: 8px 12px; border: 1px solid var(--border);
        border-radius: var(--radius-sm); font-family: 'Inter', sans-serif; font-size: 13.5px;
        background: var(--surface-2); color: var(--text); outline: none;
        transition: border-color .15s, box-shadow .15s;
      }
      #busqueda:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,110,248,0.12); background: var(--surface); }
      #busqueda::placeholder { color: var(--text-hint); }
      .topbar-actions { display: flex; gap: 6px; margin-left: auto; flex-shrink: 0; }
      .btn-icon {
        display: flex; align-items: center; justify-content: center;
        width: 36px; height: 36px; border-radius: var(--radius-sm);
        border: 1px solid var(--border); background: var(--surface);
        color: var(--text-sub); cursor: pointer; font-size: 16px;
        transition: background .14s, border-color .14s, color .14s;
      }
      .btn-icon:hover { background: var(--surface-2); border-color: var(--border-2); color: var(--text); }
      .btn-icon.accent { background: var(--accent); border-color: var(--accent); color: #fff; font-size: 20px; }
      .btn-icon.accent:hover { background: var(--accent-2); border-color: var(--accent-2); }

      #chips-wrap {
        position: fixed; top: calc(var(--topbar-h) + var(--busqueda-h)); left: 0; right: 0; height: var(--chips-h);
        background: var(--surface); border-bottom: 1px solid var(--border);
        display: flex; align-items: center; padding: 0 16px; gap: 6px;
        overflow-x: auto; z-index: 99; scrollbar-width: none;
      }
      #chips-wrap::-webkit-scrollbar { display: none; }
      .chip {
        flex-shrink: 0; padding: 5px 14px; border-radius: 20px; font-size: 12.5px; font-weight: 500;
        border: 1px solid var(--border); background: var(--surface-2); color: var(--text-sub);
        cursor: pointer; transition: background .13s, border-color .13s, color .13s;
        display: flex; align-items: center; gap: 5px; white-space: nowrap;
      }
      .chip:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
      .chip.activo { background: var(--accent); border-color: var(--accent); color: #fff; }
      .chip-count { font-size: 10px; border-radius: 10px; padding: 0 5px; font-weight: 600; }
      .chip.activo .chip-count { background: rgba(255,255,255,0.3); }
      .chip:not(.activo) .chip-count { background: var(--border); color: var(--text-hint); }
      .chip-nueva {
        flex-shrink: 0; padding: 5px 12px; border-radius: 20px; font-size: 12px;
        border: 1px dashed var(--border-2); background: transparent; color: var(--text-hint);
        cursor: pointer; transition: border-color .13s, color .13s;
      }
      .chip-nueva:hover { border-color: var(--accent); color: var(--accent); }
      .chip.fijada::before { content: '📌 '; font-size: 11px; }

      #contenido { padding: calc(var(--topbar-h) + var(--busqueda-h) + var(--chips-h) + 20px) 16px 30px; max-width: 1000px; margin: 0 auto; }
      #resultado-count { font-size: 12px; color: var(--text-hint); margin-bottom: 14px; min-height: 18px; }

      #grid { display: flex; flex-direction: column; gap: 8px; }

      .tarjeta {
        background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
        box-shadow: var(--shadow); padding: 0; cursor: pointer; 
        transition: box-shadow .15s, border-color .15s, transform .12s;
        display: flex; flex-direction: row; align-items: center;
        gap: 12px; position: relative; overflow: hidden;
      }
      .tarjeta:hover { box-shadow: var(--shadow-md); border-color: var(--accent); transform: translateY(-1px); }
      .tarjeta-top { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
      .tarjeta-icono {
        width: 36px; height: 36px; border-radius: var(--radius-xs); flex-shrink: 0;
        overflow: hidden; display: flex; align-items: center; justify-content: center;
        background: var(--surface-2); border: 1px solid var(--border);
      }
      .tarjeta-icono img { width: 100%; height: 100%; object-fit: contain; }
      .icono-fallback {
        width: 36px; height: 36px; border-radius: var(--radius-xs);
        background: var(--accent-soft); border: 1px solid var(--border);
        display: flex; align-items: center; justify-content: center;
        font-size: 15px; font-weight: 700; color: var(--accent); flex-shrink: 0;
      }
      .tarjeta-info { flex: 1; display: flex; flex-direction: column; gap: 3px; overflow: hidden; }
      .tarjeta-titulo {
        font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }

      .tarjeta-url { font-size: 11px; color: var(--text-hint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .tarjeta-carpeta {
        display: inline-flex; align-items: center; gap: 4px; font-size: 10.5px;
        color: var(--accent); background: var(--accent-soft); border-radius: 4px;
        padding: 2px 7px; align-self: flex-start;
      }



      #estado-vacio {
        display: none; flex-direction: column; align-items: center;
        justify-content: center; padding: 60px 20px; gap: 10px; text-align: center;
      }
      #estado-vacio .vacio-icon { font-size: 3rem; opacity: .3; }
      #estado-vacio p { font-size: 13px; color: var(--text-hint); max-width: 260px; line-height: 1.6; }

      .modal-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.45);
        z-index: 200; display: none; align-items: center; justify-content: center; padding: 16px;
      }
      .modal-overlay.visible { display: flex; }
      .modal-box {
        background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md);
        width: 100%; max-width: 420px; display: flex; flex-direction: column; overflow: hidden;
        animation: slideUp .2s ease; max-height: 88vh;
      }
      .modal-body { overflow-y: auto; }
      #modal-boveda .modal-box {
        max-height: 80vh; height: auto;
      }
      #modal-boveda .modal-body {
        flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0;
        max-height: calc(80vh - 60px);
      }
      #boveda-items-scroll {
        flex: 1; overflow-y: auto; padding-bottom: 8px;
      }
      #boveda-footer {
        flex-shrink: 0; padding-top: 10px; border-top: 1px solid var(--border);
      }
      @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
      .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--border); }
      .modal-header strong { font-size: 14px; font-weight: 600; }
      .modal-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
      .modal-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
      .campo { display: flex; flex-direction: column; gap: 5px; }
      .campo label { font-size: 11.5px; font-weight: 600; color: var(--text-sub); }
      .campo input, .campo select {
        padding: 8px 11px; border: 1px solid var(--border); border-radius: var(--radius-sm);
        font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text);
        background: var(--surface-2); outline: none; transition: border-color .15s, box-shadow .15s;
      }
      .campo input:focus, .campo select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,110,248,0.12); background: var(--surface); }
      .btn {
        padding: 8px 18px; border-radius: var(--radius-sm); font-family: 'Inter', sans-serif;
        font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border);
        background: var(--surface-2); color: var(--text); transition: background .13s, border-color .13s;
      }
      .btn:hover { background: var(--border); }
      .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
      .btn.primary:hover { background: var(--accent-2); border-color: var(--accent-2); }
      .btn.danger { background: var(--danger); border-color: var(--danger); color: #fff; }
      .btn.danger:hover { background: #c03030; border-color: #c03030; }

      #toast {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: #1a1e2a; color: #fff; padding: 9px 18px;
        border-radius: var(--radius-sm); font-size: 12.5px;
        z-index: 999; display: none; white-space: nowrap; box-shadow: var(--shadow-md);
      }
      #spinner {
        position: fixed; bottom: 20px; right: 20px; background: var(--surface);
        border: 1px solid var(--border); border-radius: var(--radius-sm);
        padding: 7px 14px; font-size: 12px; color: var(--text-sub);
        display: none; box-shadow: var(--shadow);
      }
      @media (max-width: 480px) {
        #grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); }
        #topbar-logo { font-size: 15px; }
      }
      .tarjeta { overflow: hidden; touch-action: pan-y; }
      .tarjeta-delete-bg {
        position: absolute; top: 0; right: 0; bottom: 0;
        background: var(--danger); display: flex; align-items: center;
        justify-content: flex-end; padding: 0 20px;
        font-size: 13px; font-weight: 600; color: #fff;
        pointer-events: none; opacity: 0; transition: opacity .15s;
        border-radius: var(--radius);
      }
      .tarjeta-edit-bg {
        position: absolute; top: 0; left: 0; bottom: 0;
        background: #2e9e5b; display: flex; align-items: center;
        justify-content: flex-start; padding: 0 20px;
        font-size: 13px; font-weight: 600; color: #fff;
        pointer-events: none; opacity: 0; transition: opacity .15s;
        border-radius: var(--radius);
      }
      .tarjeta-inner {
        display: flex; flex-direction: row; align-items: center;
        gap: 12px; width: 100%; position: relative; z-index: 1;
        background: var(--surface); border-radius: var(--radius);
        padding: 12px 16px;
        transition: transform .2s ease; will-change: transform;
      }

      /* ── BÓVEDA ── */
      .boveda-seccion { margin-bottom: 18px; }
      .boveda-seccion-titulo {
        font-size: 11px; font-weight: 700; color: var(--text-hint);
        text-transform: uppercase; letter-spacing: .06em;
        margin-bottom: 8px; padding: 0 2px;
      }
      .boveda-item {
        background: var(--surface-2); border: 1px solid var(--border);
        border-radius: var(--radius-sm); padding: 10px 14px;
        display: flex; align-items: center; gap: 10px;
        margin-bottom: 6px; cursor: pointer;
        transition: border-color .13s, background .13s;
      }
      .boveda-item:hover { border-color: var(--accent); background: var(--accent-soft); }
      .boveda-item-icon { font-size: 20px; flex-shrink: 0; }
      .boveda-item-info { flex: 1; overflow: hidden; }
      .boveda-item-nombre { font-size: 13px; font-weight: 600; color: var(--text); }
      .boveda-item-sub { font-size: 11px; color: var(--text-hint); margin-top: 2px; }
      .boveda-campo-valor {
        font-family: monospace; background: var(--surface);
        border: 1px solid var(--border); border-radius: var(--radius-xs);
        padding: 6px 10px; font-size: 13px; color: var(--text);
        display: flex; align-items: center; justify-content: space-between;
        gap: 8px; margin-top: 4px;
      }
      .boveda-campo-valor span { flex: 1; letter-spacing: .08em; }
      .boveda-campo-valor span.nota-contenido {
        white-space: pre-wrap; letter-spacing: 0; line-height: 1.6;
        max-height: calc(70vh - 160px); overflow-y: auto; font-family: Inter, sans-serif;
      }
      .boveda-pin-wrap {
        display: flex; flex-direction: column; align-items: center;
        gap: 14px; padding: 10px 0;
      }
      .boveda-pin-wrap p { font-size: 13px; color: var(--text-sub); text-align: center; }
      .boveda-pin-input {
        width: 100%; padding: 10px 14px; border: 2px solid var(--border);
        border-radius: var(--radius-sm); font-size: 18px; text-align: center;
        letter-spacing: .2em; font-family: monospace;
        background: var(--surface-2); color: var(--text); outline: none;
        transition: border-color .15s;
      }
      .boveda-pin-input:focus { border-color: var(--accent); }
      .boveda-acciones { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
      .boveda-tipo-btn {
        flex: 1; padding: 8px; border-radius: var(--radius-sm);
        border: 1px solid var(--border); background: var(--surface-2);
        font-size: 12px; cursor: pointer; text-align: center;
        transition: background .13s, border-color .13s;
      }
      .boveda-tipo-btn.activo { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 600; }

    </style>
  </head>
  <body>

    <div id="topbar">
      <div id="topbar-logo">🔖 Marcadores</div>
      <div class="topbar-actions">
        <div style="position:relative;">
          <button class="btn-icon" title="Guardar" onclick="toggleMenuGuardar(event)">💾</button>
          <div id="menu-guardar" style="display:none;position:absolute;top:42px;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow-md);z-index:300;min-width:150px;overflow:hidden;">
            <div onclick="exportarJSON()" style="padding:10px 14px;font-size:12.5px;cursor:pointer;transition:background .12s;" onmouseover="this.style.background='var(--surface-2)'" onmouseout="this.style.background=''">📄 Guardar JSON local</div>
            <div onclick="guardarNube();cerrarMenus()" style="padding:10px 14px;font-size:12.5px;cursor:pointer;border-top:1px solid var(--border);transition:background .12s;" onmouseover="this.style.background='var(--surface-2)'" onmouseout="this.style.background=''">☁️ Guardar en nube</div>
          </div>
        </div>
        <div style="position:relative;">
          <button class="btn-icon" title="Cargar" onclick="toggleMenuCargar(event)">📂</button>
          <div id="menu-cargar" style="display:none;position:absolute;top:42px;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow-md);z-index:300;min-width:150px;overflow:hidden;">
            <div onclick="importarJSON()" style="padding:10px 14px;font-size:12.5px;cursor:pointer;transition:background .12s;" onmouseover="this.style.background='var(--surface-2)'" onmouseout="this.style.background=''">📄 Cargar JSON local</div>
            <div onclick="cargarNube();cerrarMenus()" style="padding:10px 14px;font-size:12.5px;cursor:pointer;border-top:1px solid var(--border);transition:background .12s;" onmouseover="this.style.background='var(--surface-2)'" onmouseout="this.style.background=''">☁️ Cargar desde nube</div>
          </div>
        </div>
        <input type="file" id="input-json" accept=".json" style="display:none" onchange="procesarJSON(this)">

        <button class="btn-icon" title="Worker URL" onclick="abrirConfigWorker()">⚙️</button>
        <button class="btn-icon" title="Bóveda" onclick="abrirBoveda()">🔒</button>
        <input type="file" id="input-gpass" accept=".csv" style="display:none" onchange="procesarCSVGoogle(this)">
        <button class="btn-icon accent" title="Agregar marcador" onclick="abrirModalAgregar()">+</button>
      </div>
    </div>

    <!-- BARRA DE BÚSQUEDA -->
    <div id="busqueda-bar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="busqueda" type="text" placeholder="Buscar marcadores…" oninput="filtrar()"
             onkeydown="if(event.key==='Enter' && this.value.trim()) window.open('https://www.google.com/search?q='+encodeURIComponent(this.value.trim()),'_blank','noopener')">
    </div>

    <div id="chips-wrap">
      <div class="chip activo" data-carpeta="__todas__" onclick="seleccionarCarpeta('__todas__', this)">
        Todas <span class="chip-count" id="count-todas">0</span>
      </div>
      <div class="chip-nueva" onclick="abrirModalCarpeta()">+ Carpeta</div>
    </div>

    <div id="contenido">
      <div id="resultado-count"></div>
      <div id="grid"></div>
      <div id="estado-vacio">
        <div class="vacio-icon">🔖</div>
        <p>Sin marcadores aquí.<br>Presiona <strong>+</strong> para agregar uno.</p>
      </div>
    </div>

    <div class="modal-overlay" id="modal-agregar">
      <div class="modal-box">
        <div class="modal-header">
          <strong id="modal-agregar-titulo">Agregar marcador</strong>
          <button class="btn-icon" onclick="cerrarModal('modal-agregar')">✕</button>
        </div>
        <div class="modal-body">
          <div class="campo"><label>URL</label><input type="text" id="input-url" placeholder="https://…" oninput="autocompletarTitulo()"></div>
          <div class="campo"><label>Título</label><input type="text" id="input-titulo" placeholder="Nombre del sitio"></div>
          <div class="campo"><label>Carpeta</label><select id="input-carpeta"></select></div>
        </div>

        <div class="modal-footer">
          <button class="btn" onclick="cerrarModal('modal-agregar')">Cancelar</button>
          <button class="btn primary" onclick="guardarMarcador()">Guardar</button>
        </div>

      </div>
    </div>

    <div class="modal-overlay" id="modal-carpeta">
      <div class="modal-box">
        <div class="modal-header">
          <strong id="modal-carpeta-titulo">Nueva carpeta</strong>
          <button class="btn-icon" onclick="cerrarModal('modal-carpeta')">✕</button>
        </div>
        <div class="modal-body">
          <div class="campo">
            <label>Nombre</label>
            <input type="text" id="input-carpeta-nombre" placeholder="Ej: Trabajo, Personal…"
                   onkeydown="if(event.key==='Enter') guardarCarpeta()">
          </div>
        </div>
        <div class="modal-footer" style="flex-wrap:wrap;gap:6px;">
          <button class="btn" onclick="cerrarModal('modal-carpeta')">Cancelar</button>
          <button class="btn danger" id="btn-eliminar-carpeta" style="display:none" onclick="eliminarCarpeta()">Eliminar</button>
          <button class="btn" id="btn-fijar-carpeta" style="display:none" onclick="fijarCarpeta()">📌 Fijar inicio</button>
          <button class="btn primary" onclick="guardarCarpeta()">Guardar</button>
        </div>      
      </div>
    </div>

    <!-- MODAL BÓVEDA -->
    <div class="modal-overlay" id="modal-boveda">
      <div class="modal-box" style="max-width:480px;">
        <div class="modal-header">
          <strong id="boveda-titulo">🔒 Bóveda</strong>
          <button class="btn-icon" onclick="cerrarBoveda()">✕</button>
        </div>
        <div id="boveda-search-wrap" style="display:none;padding:8px 16px;border-bottom:1px solid var(--border);">
          <input id="boveda-search" type="text" placeholder="Buscar en bóveda…"
                 style="width:100%;padding:7px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:Inter,sans-serif;font-size:13px;background:var(--surface-2);color:var(--text);outline:none;box-sizing:border-box;"
                 onkeydown="if(event.key==='Enter') bovedaBuscar(this.value.trim())"
                 oninput="if(!this.value.trim()) bovedaBuscar('')">
        </div>
        <div class="modal-body" id="boveda-body">
          <!-- Se llena dinámicamente -->
        </div>
      </div>
    </div>

    <!-- MODAL ITEM BÓVEDA -->
    <div class="modal-overlay" id="modal-boveda-item">
      <div class="modal-box" style="max-width:480px;">
        <div class="modal-header">
          <strong id="boveda-item-titulo">Nuevo item</strong>
          <button class="btn-icon" onclick="cerrarModal('modal-boveda-item')">✕</button>
        </div>
        <div class="modal-body" id="boveda-item-body">
          <!-- Se llena dinámicamente -->
        </div>
        <div class="modal-footer">
          <button class="btn" onclick="cerrarModal('modal-boveda-item')">Cancelar</button>
          <button class="btn primary" onclick="bovedaGuardarItem()">Guardar</button>
        </div>
      </div>
    </div>

    <div id="toast"></div>
    <div id="spinner">⏳ Cargando íconos…</div>

    <script>
      const WORKER_KEY = '_cf_worker_url';
      let CF_WORKER    = localStorage.getItem(WORKER_KEY) || '';
      const KV_ID_KEY  = '_marcadores_id';
      const LS_BACKUP  = '_marcadores_backup';

      let marcadores = [];
      let carpetas   = [];
      let carpetaActiva       = '__todas__';
      let editandoId          = null;
      let editandoCarpetaOrig = null;

      /* ── IndexedDB ── */
      const DB_NAME    = 'MarcadoresDB';
      const DB_VERSION = 3;
      let db = null;

      function abrirDB() {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open(DB_NAME, DB_VERSION);
          req.onupgradeneeded = e => {
            const d = e.target.result;
            if (!d.objectStoreNames.contains('datos'))  d.createObjectStore('datos',  { keyPath: 'clave' });
            if (!d.objectStoreNames.contains('iconos')) d.createObjectStore('iconos', { keyPath: 'url' });
            if (!d.objectStoreNames.contains('boveda')) d.createObjectStore('boveda', { keyPath: 'clave' });
          };
          req.onsuccess = e => { db = e.target.result; resolve(db); };
          req.onerror   = e => reject(e.target.error);
        });
      }

      function dbPut(store, obj) {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(store, 'readwrite');
          tx.objectStore(store).put(obj).onsuccess = () => resolve();
          tx.onerror = e => reject(e.target.error);
        });
      }

      function dbGet(store, key) {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(store, 'readonly');
          const req = tx.objectStore(store).get(key);
          req.onsuccess = e => resolve(e.target.result);
          req.onerror   = e => reject(e.target.error);
        });
      }

      async function persistir() {
        await dbPut('datos', { clave: 'principal', marcadores, carpetas });
        try { localStorage.setItem(LS_BACKUP, JSON.stringify({ marcadores, carpetas })); } catch(e) {}
      }

      async function cargarDatos() {
        try {
          const d = await dbGet('datos', 'principal');
          if (d) { marcadores = d.marcadores || []; carpetas = d.carpetas || []; return; }
        } catch(e) {}
        try {
          const b = JSON.parse(localStorage.getItem(LS_BACKUP) || 'null');
          if (b) { marcadores = b.marcadores || []; carpetas = b.carpetas || []; toast('📦 Datos cargados desde respaldo local'); }
        } catch(e) {}
      }

      async function guardarIconoDB(clave, blob) {
        try { await dbPut('iconos', { url: clave, blob }); } catch(e) {}
      }

      /* ── Init ── */
      async function init() {
        await abrirDB();
        await cargarDatos();
        const fijada = localStorage.getItem('_marcadores_carpeta_inicio');
        if (fijada && carpetas.includes(fijada)) carpetaActiva = fijada;
        renderChips();
        renderGrid();
        actualizarIconosFaltantes();
      }
      init();

      function getId() {
        let id = localStorage.getItem(KV_ID_KEY);
        if (!id) { id = 'mrc_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); localStorage.setItem(KV_ID_KEY, id); }
        return id;
      }

      /* ── Íconos ── */
      function dominioDe(url) { try { return new URL(url).hostname; } catch { return ''; } }
      function urlIconoGoogle(dom) {
        const base = CF_WORKER ? CF_WORKER + '/raw?target=' : '';
        const googleUrl = `https://www.google.com/s2/favicons?domain=${dom}&sz=64`;
        return base ? base + encodeURIComponent(googleUrl) : googleUrl;
      }

      const blobURLCache = {};

      async function descargarYGuardarIcono(dominio, urlBase = null) {
        if (!CF_WORKER) return null;

        const raw = (url) => CF_WORKER + '/raw?target=' + encodeURIComponent(url);

        // ── Paso 1: icono.jpg relativo a la URL del marcador (apps propias) ──
        if (urlBase) {
          try {
            let baseDir = urlBase;
            if (!baseDir.endsWith('/')) {
              const ultimoSegmento = baseDir.substring(baseDir.lastIndexOf('/') + 1);
              if (!ultimoSegmento.includes('.')) baseDir += '/';
              else baseDir = baseDir.substring(0, baseDir.lastIndexOf('/') + 1);
            }
            const resp = await fetch(raw(baseDir + 'icono.jpg'));
            if (resp.ok) {
              const blob = await resp.blob();
              if (blob.size > 0 && blob.type.startsWith('image')) {
                await guardarIconoDB(urlBase || dominio, blob);
                return URL.createObjectURL(blob);
              }
            }
          } catch(e) {}
        }

        // ── Paso 2: Google Favicons ──
        try {
          const resp = await fetch(raw(`https://www.google.com/s2/favicons?domain=${dominio}&sz=64`));
          if (resp.ok) {
            const blob = await resp.blob();
            if (blob.size > 0) {
              await guardarIconoDB(urlBase || dominio, blob);
              return URL.createObjectURL(blob);
            }
          }
        } catch(e) {}

        return null;
      }

      async function actualizarIconosFaltantes() {
        const sinIcono = []; // array de { clave, urlBase }
        for (const m of marcadores) {
          const clave = m.url; // usar URL completa como clave
          if (blobURLCache[clave] !== undefined) continue;
          const enDB = await dbGet('iconos', clave);
          if (enDB && enDB.blob) {
            blobURLCache[clave] = URL.createObjectURL(enDB.blob);
          } else {
            sinIcono.push(clave);
            blobURLCache[clave] = null;
          }
        }
        renderGrid();
        if (!sinIcono.length) return;
        mostrarSpinner(true);

        const unicas = [...new Set(sinIcono)];
        const LOTE = 5;
        for (let i = 0; i < unicas.length; i += LOTE) {
          await Promise.all(unicas.slice(i, i + LOTE).map(async clave => {
            const blobURL = await descargarYGuardarIcono(dominioDe(clave), clave);
            blobURLCache[clave] = blobURL;
          }));
          renderGrid();
        }

        mostrarSpinner(false);
        renderGrid();
      }

      /* ── Chips ── */
      function renderChips() {
        const wrap     = document.getElementById('chips-wrap');
        const btnNueva = wrap.querySelector('.chip-nueva');
        wrap.querySelectorAll('.chip:not([data-carpeta="__todas__"])').forEach(c => c.remove());
        carpetas.forEach(carp => {
          const count = marcadores.filter(m => m.carpeta === carp).length;
          const chip  = document.createElement('div');
          const fijada = localStorage.getItem('_marcadores_carpeta_inicio');
          chip.className = 'chip' + (carpetaActiva === carp ? ' activo' : '') + (carp === fijada ? ' fijada' : '');
          chip.dataset.carpeta = carp;
          chip.innerHTML = `${carp} <span class="chip-count">${count}</span>`;
          chip.onclick    = () => seleccionarCarpeta(carp, chip);
          chip.ondblclick = e => { e.stopPropagation(); abrirModalCarpeta(carp); };
          chip.title = 'Doble clic para editar';
          wrap.insertBefore(chip, btnNueva);
        });
        document.getElementById('count-todas').textContent = marcadores.length;
        if (carpetaActiva === '__todas__') {
          wrap.querySelectorAll('.chip').forEach(c => c.classList.remove('activo'));
          wrap.querySelector('[data-carpeta="__todas__"]').classList.add('activo');
        }
      }

      function seleccionarCarpeta(carp, el) {
        carpetaActiva = carp;
        document.querySelectorAll('#chips-wrap .chip').forEach(c => c.classList.remove('activo'));
        el.classList.add('activo');
        filtrar();
      }

      /* ── Grid ── */
      function marcadoresFiltrados() {
        const q = document.getElementById('busqueda').value.trim().toLowerCase();
        return marcadores
          .filter(m => {
          const enCarpeta = carpetaActiva === '__todas__' || m.carpeta === carpetaActiva;
          if (!enCarpeta) return false;
          if (!q) return true;
          return (m.titulo + ' ' + m.url).toLowerCase().includes(q);
        })
          .sort((a, b) => (a.titulo || '').localeCompare(b.titulo || '', 'es', { numeric: true, sensitivity: 'base' }));
      }

      function renderGrid() {
        const grid    = document.getElementById('grid');
        const vacio   = document.getElementById('estado-vacio');
        const countEl = document.getElementById('resultado-count');
        const lista   = marcadoresFiltrados();
        grid.innerHTML = '';
        if (!lista.length) { vacio.style.display = 'flex'; countEl.textContent = ''; return; }
        vacio.style.display = 'none';
        const q = document.getElementById('busqueda').value.trim();
        countEl.textContent = q ? `${lista.length} resultado${lista.length !== 1 ? 's' : ''} para "${q}"` : '';

        lista.forEach(m => {
          const dom  = dominioDe(m.url);
          const card = document.createElement('div');
          card.className = 'tarjeta';

          // Fondo rojo de eliminación (izquierda)
          const deleteBg = document.createElement('div');
          deleteBg.className = 'tarjeta-delete-bg';
          deleteBg.innerHTML = '🗑️ Eliminar';
          card.appendChild(deleteBg);

          // Fondo verde de editar (derecha)
          const editBg = document.createElement('div');
          editBg.className = 'tarjeta-edit-bg';
          editBg.innerHTML = '✏️ Editar';
          card.appendChild(editBg);

          // Contenedor deslizable
          const inner = document.createElement('div');
          inner.className = 'tarjeta-inner';
          inner.onclick = () => window.open(m.url, '_blank', 'noopener');

          // Swipe logic
          let startX = 0, currentX = 0, swiping = false;
          const MAX_SWIPE = 140;

          inner.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            currentX = 0;
            swiping = true;
          }, { passive: true });

          inner.addEventListener('touchmove', e => {
            if (!swiping) return;
            const dx = e.touches[0].clientX - startX;
            if (dx < 0) {
              // Izquierda → eliminar
              currentX = Math.max(dx, -MAX_SWIPE);
              inner.style.transform = `translateX(${currentX}px)`;
              deleteBg.style.opacity = Math.abs(currentX) / MAX_SWIPE;
              editBg.style.opacity = '0';
            } else {
              // Derecha → editar
              currentX = Math.min(dx, MAX_SWIPE);
              inner.style.transform = `translateX(${currentX}px)`;
              editBg.style.opacity = currentX / MAX_SWIPE;
              deleteBg.style.opacity = '0';
            }
          }, { passive: true });

          inner.addEventListener('touchend', () => {
            swiping = false;
            if (currentX <= -MAX_SWIPE * 0.75) {
              // Eliminar
              inner.style.transform = `translateX(-${MAX_SWIPE}px)`;
              setTimeout(async () => {
                card.style.transition = 'height .2s ease, opacity .2s ease, margin .2s ease';
                card.style.height = card.offsetHeight + 'px';
                requestAnimationFrame(() => {
                  card.style.height = '0';
                  card.style.opacity = '0';
                  card.style.marginBottom = '0';
                });
                setTimeout(async () => { await eliminarMarcador(m.id); }, 220);
              }, 100);
            } else if (currentX >= MAX_SWIPE * 0.75) {
              // Editar
              inner.style.transform = 'translateX(0)';
              editBg.style.opacity = '0';
              abrirModalEditar(m.id);
            } else {
              // Cancelar — volver
              inner.style.transform = 'translateX(0)';
              deleteBg.style.opacity = '0';
              editBg.style.opacity = '0';
            }
            currentX = 0;
          });

          const top = document.createElement('div');
          top.className = 'tarjeta-top';

          const blobURL = blobURLCache[m.url] ?? null;
          if (blobURL) {
            const wrap = document.createElement('div');
            wrap.className = 'tarjeta-icono';
            const img = document.createElement('img');
            img.src = blobURL; img.alt = '';
            img.onerror = () => { wrap.replaceWith(crearFallback(dom)); };
            wrap.appendChild(img);
            top.appendChild(wrap);
          } else {
            top.appendChild(crearFallback(dom));
          }

          inner.appendChild(top);

          const info = document.createElement('div');
          info.className = 'tarjeta-info';

          const tit = document.createElement('div');
          tit.className = 'tarjeta-titulo';
          tit.textContent = m.titulo || dom;
          info.appendChild(tit);

          const urlEl = document.createElement('div');
          urlEl.className = 'tarjeta-url';
          urlEl.textContent = dom || m.url;
          info.appendChild(urlEl);

          inner.appendChild(info);

          if (m.carpeta) {
            const badge = document.createElement('div');
            badge.className = 'tarjeta-carpeta';
            badge.textContent = '📁 ' + m.carpeta;
            inner.appendChild(badge);
          }

          // acciones eliminadas — swipe reemplaza editar y eliminar
          card.appendChild(inner);
          grid.appendChild(card);
        });
      }

      function crearFallback(dom) {
        const el = document.createElement('div');
        el.className = 'icono-fallback';
        el.textContent = dom ? dom[0].toUpperCase() : '🔖';
        return el;
      }

      function filtrar() { renderGrid(); }

      /* ── Modal agregar/editar ── */
      function abrirModalAgregar() {
        editandoId = null;
        document.getElementById('modal-agregar-titulo').textContent = 'Agregar marcador';
        document.getElementById('input-url').value    = '';
        document.getElementById('input-titulo').value = '';
        llenarSelectCarpetas('');
        document.getElementById('modal-agregar').classList.add('visible');
        setTimeout(() => document.getElementById('input-url').focus(), 100);
      }

      function abrirModalEditar(id) {
        const m = marcadores.find(x => x.id === id);
        if (!m) return;
        editandoId = id;
        document.getElementById('modal-agregar-titulo').textContent = 'Editar marcador';
        document.getElementById('input-url').value    = m.url;
        document.getElementById('input-titulo').value = m.titulo;
        llenarSelectCarpetas(m.carpeta);
        document.getElementById('modal-agregar').classList.add('visible');
        setTimeout(() => document.getElementById('input-titulo').focus(), 100);
      }

      function llenarSelectCarpetas(sel) {
        const el = document.getElementById('input-carpeta');
        el.innerHTML = '<option value="">— Sin carpeta —</option>';
        carpetas.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c; opt.textContent = c;
          if (c === sel) opt.selected = true;
          el.appendChild(opt);
        });
      }

      function autocompletarTitulo() {    
        const urlRaw = document.getElementById('input-url').value.trim();
        if (!urlRaw) return;
        if (document.getElementById('input-titulo').value) return;
        const url = urlRaw.startsWith('http') ? urlRaw : 'https://' + urlRaw;

        // Fallback: unir los últimos dos segmentos de la URL
        const fallback = () => {
          try {
            const parsed = new URL(url);
            const segmentos = parsed.pathname.split('/').filter(s => s.length > 0);
            if (segmentos.length >= 2) {
              // Tomar los últimos dos segmentos y unirlos
              const ultimos = segmentos.slice(-2).join(' ');
              return ultimos.replace(/[-_]/g, ' ').trim();
            } else if (segmentos.length === 1) {
              return segmentos[0].replace(/[-_]/g, ' ').trim();
            }
            return parsed.hostname;
          } catch { return ''; }
        };

        document.getElementById('input-titulo').value = fallback();
        document.getElementById('input-titulo').placeholder = 'Nombre del sitio';        
      }

      async function guardarMarcador() {
        let url   = document.getElementById('input-url').value.trim();
        const tit = document.getElementById('input-titulo').value.trim();
        const carp = document.getElementById('input-carpeta').value;
        if (!url) { toast('⚠️ Ingresa una URL'); return; }
        if (!url.startsWith('http')) url = 'https://' + url;
        const dom = dominioDe(url);

        // Verificar duplicado (ignorar si estamos editando el mismo)
        const duplicado = marcadores.find(m => m.url === url && m.id !== editandoId);
        if (duplicado) {
          toast('⚠️ Ya existe un marcador con esa URL');
          return;
        }

        if (editandoId) {
          const idx = marcadores.findIndex(m => m.id === editandoId);
          if (idx !== -1) marcadores[idx] = { ...marcadores[idx], url, titulo: tit || dom, carpeta: carp };
          toast('✅ Marcador actualizado');
        } else {
          marcadores.push({ id: 'm_' + Date.now(), titulo: tit || dom, url, carpeta: carp });
          toast('✅ Marcador agregado');
          if (blobURLCache[url] === undefined) {
            const blobURL = await descargarYGuardarIcono(dom, url);
            blobURLCache[url] = blobURL;
          }
        }
        await persistir();
        renderChips(); renderGrid();
        cerrarModal('modal-agregar');
      }

      async function eliminarMarcador(id) {
        marcadores = marcadores.filter(m => m.id !== id);
        await persistir(); renderChips(); renderGrid();
        toast('🗑️ Marcador eliminado');
      }

      /* ── Modal carpeta ── */
      function abrirModalCarpeta(carpetaExistente = null) {
        editandoCarpetaOrig = carpetaExistente;
        document.getElementById('modal-carpeta-titulo').textContent = carpetaExistente ? 'Editar carpeta' : 'Nueva carpeta';
        document.getElementById('input-carpeta-nombre').value = carpetaExistente || '';
        document.getElementById('btn-eliminar-carpeta').style.display = carpetaExistente ? 'block' : 'none';
        document.getElementById('btn-fijar-carpeta').style.display   = carpetaExistente ? 'block' : 'none';
        const fijada = localStorage.getItem('_marcadores_carpeta_inicio');
        document.getElementById('btn-fijar-carpeta').textContent =
          carpetaExistente === fijada ? '📌 Quitar fijación' : '📌 Fijar inicio';
        document.getElementById('modal-carpeta').classList.add('visible');
        setTimeout(() => document.getElementById('input-carpeta-nombre').focus(), 100);
      }

      function fijarCarpeta() {
        const fijada = localStorage.getItem('_marcadores_carpeta_inicio');
        if (editandoCarpetaOrig === fijada) {
          localStorage.removeItem('_marcadores_carpeta_inicio');
          toast('📌 Fijación eliminada');
        } else {
          localStorage.setItem('_marcadores_carpeta_inicio', editandoCarpetaOrig);
          toast('📌 ' + editandoCarpetaOrig + ' fijada como inicio');
        }
        cerrarModal('modal-carpeta');
        renderChips();
      }

      async function guardarCarpeta() {
        const nombre = document.getElementById('input-carpeta-nombre').value.trim();
        if (!nombre) { toast('⚠️ Ingresa un nombre'); return; }
        if (editandoCarpetaOrig) {
          const idx = carpetas.indexOf(editandoCarpetaOrig);
          if (idx !== -1) carpetas[idx] = nombre;
          marcadores.forEach(m => { if (m.carpeta === editandoCarpetaOrig) m.carpeta = nombre; });
          if (carpetaActiva === editandoCarpetaOrig) carpetaActiva = nombre;
          toast('✅ Carpeta renombrada');
        } else {
          if (carpetas.includes(nombre)) { toast('⚠️ Ya existe esa carpeta'); return; }
          carpetas.push(nombre); toast('✅ Carpeta creada');
        }
        await persistir(); renderChips(); renderGrid();
        cerrarModal('modal-carpeta');
      }

      async function eliminarCarpeta() {
        if (!editandoCarpetaOrig) return;
        const tiene = marcadores.some(m => m.carpeta === editandoCarpetaOrig);
        if (tiene && !confirm(`La carpeta "${editandoCarpetaOrig}" tiene marcadores. ¿Eliminarla y dejar los marcadores sin carpeta?`)) return;
        marcadores.forEach(m => { if (m.carpeta === editandoCarpetaOrig) m.carpeta = ''; });
        carpetas = carpetas.filter(c => c !== editandoCarpetaOrig);
        if (carpetaActiva === editandoCarpetaOrig) carpetaActiva = '__todas__';
        await persistir(); renderChips(); renderGrid();
        cerrarModal('modal-carpeta'); toast('🗑️ Carpeta eliminada');
      }

      /* ── Nube KV ── */
      async function guardarNube() {
        if (!CF_WORKER) { toast('⚠️ Configura el Worker URL primero'); return; }
        try {
          const resp = await fetch(`${CF_WORKER}/kv-save`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: getId(), data: { marcadores, carpetas } })
          });
          if (resp.ok) toast('☁️ Guardado en la nube ✓');
          else throw new Error(resp.statusText);
        } catch(e) { toast('❌ Error: ' + e.message); }
      }

      async function cargarNube() {
        if (!CF_WORKER) { toast('⚠️ Configura el Worker URL primero'); return; }
        try {
          const resp = await fetch(`${CF_WORKER}/kv-load?id=${getId()}`);
          const data = await resp.json();
          if (data && data.marcadores) {
            marcadores = data.marcadores; carpetas = data.carpetas || [];
            await persistir();
            Object.keys(blobURLCache).forEach(k => delete blobURLCache[k]);
            renderChips(); renderGrid(); actualizarIconosFaltantes();
            toast(`☁️ ${marcadores.length} marcadores cargados`);
          } else { toast('☁️ Sin datos en la nube'); }
        } catch(e) { toast('❌ Error: ' + e.message); }
      }

      /* ── Exportar / Importar JSON local ── */
      function exportarJSON() {
        cerrarMenus();
        const datos = { marcadores, carpetas };
        const blob  = new Blob([JSON.stringify(datos, null, 2)], { type: 'application/json' });
        const a     = document.createElement('a');
        a.href      = URL.createObjectURL(blob);
        a.download  = 'marcadores.json';
        a.click();
        URL.revokeObjectURL(a.href);
        toast('📄 JSON exportado');
      }

      function importarJSON() {
        cerrarMenus();
        document.getElementById('input-json').value = '';
        document.getElementById('input-json').click();
      }

      async function procesarJSON(input) {
        const file = input.files[0];
        if (!file) return;
        try {
          const texto = await file.text();
          const datos = JSON.parse(texto);
          if (!datos.marcadores) { toast('⚠️ JSON inválido'); return; }
          marcadores = datos.marcadores;
          carpetas   = datos.carpetas || [];
          await persistir();
          Object.keys(blobURLCache).forEach(k => delete blobURLCache[k]);
          renderChips(); renderGrid(); actualizarIconosFaltantes();
          toast(`✅ ${marcadores.length} marcadores importados`);
        } catch(e) { toast('❌ Error al leer JSON: ' + e.message); }
      }

      /* ── Menús desplegables ── */
      function toggleMenuGuardar(e) {
        e.stopPropagation();
        const m = document.getElementById('menu-guardar');
        const c = document.getElementById('menu-cargar');
        c.style.display = 'none';
        m.style.display = m.style.display === 'none' ? 'block' : 'none';
      }

      function toggleMenuCargar(e) {
        e.stopPropagation();
        const m = document.getElementById('menu-cargar');
        const g = document.getElementById('menu-guardar');
        g.style.display = 'none';
        m.style.display = m.style.display === 'none' ? 'block' : 'none';
      }

      function cerrarMenus() {
        document.getElementById('menu-guardar').style.display = 'none';
        document.getElementById('menu-cargar').style.display  = 'none';
      }

      /* ── Config Worker ── */
      function abrirConfigWorker() {
        const actualWorker = CF_WORKER;
        const actualId     = getId();

        // Modal de configuración personalizado
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px;';

      /* ══════════════════════════════
         BÓVEDA — AES-GCM 256-bit

      let _bovedaKey    = null; // CryptoKey activa en sesión
      let _bovedaTipo   = 'contrasena'; // tipo seleccionado al agregar

      // ── Crypto helpers ──
      async function derivarClave(password, salt) {
        const enc  = new TextEncoder();
        const base = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
        return crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt, iterations: 200000, hash: 'SHA-256' },
          base,
          { name: 'AES-GCM', length: 256 },
          false, ['encrypt', 'decrypt']
        );
      }

      async function cifrar(key, datos) {
        const iv  = crypto.getRandomValues(new Uint8Array(12));
        const enc = new TextEncoder();
        const buf = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(JSON.stringify(datos)));
        return { iv: Array.from(iv), buf: Array.from(new Uint8Array(buf)) };
      }

      async function descifrar(key, iv, buf) {
        const dec = await crypto.subtle.decrypt(
          { name: 'AES-GCM', iv: new Uint8Array(iv) },
          key, new Uint8Array(buf)
        );
        return JSON.parse(new TextDecoder().decode(dec));
      }

      // ── IndexedDB bóveda ──
      async function bovedaGetMeta() {
        // meta: { clave:'meta', salt, verificador_iv, verificador_buf }
        return dbGet('boveda', 'meta');
      }

      async function bovedaGetItems() {
        return dbGet('boveda', 'items');
      }

      async function bovedaGuardarCifrado(key, items) {
        const cifrado = await cifrar(key, items);
        await dbPut('boveda', { clave: 'items', ...cifrado });
      }

      async function bovedaCrearMaestra() {
        const p1 = document.getElementById('boveda-pin1').value;
        const p2 = document.getElementById('boveda-pin2').value;
        if (!p1) { toast('⚠️ Ingresa una contraseña'); return; }
        if (p1 !== p2) { toast('⚠️ Las contraseñas no coinciden'); return; }
        if (p1.length < 4) { toast('⚠️ Mínimo 4 caracteres'); return; }

        const salt  = crypto.getRandomValues(new Uint8Array(16));
        const key   = await derivarClave(p1, salt);
        // Guardar verificador cifrado (texto conocido)
        const ver   = await cifrar(key, { ok: true });
        await dbPut('boveda', {
          clave: 'meta',
          salt:  Array.from(salt),
          verificador_iv:  ver.iv,
          verificador_buf: ver.buf
        });
        // Items vacíos iniciales
        await bovedaGuardarCifrado(key, []);
        _bovedaKey = key;
        toast('🔒 Bóveda creada');
        await bovedaMostrarContenido();
      }

      async function bovedaDesbloquear() {
        const pin  = document.getElementById('boveda-pin-unlock').value;
        if (!pin) { toast('⚠️ Ingresa la contraseña'); return; }
        const meta = await bovedaGetMeta();
        try {
          const key = await derivarClave(pin, new Uint8Array(meta.salt));
          // Verificar con el verificador
          await descifrar(key, meta.verificador_iv, meta.verificador_buf);
          _bovedaKey = key;
          toast('🔓 Bóveda desbloqueada');
          await bovedaMostrarContenido();
        } catch(e) {
          toast('❌ Contraseña incorrecta');
          document.getElementById('boveda-pin-unlock').value = '';
          document.getElementById('boveda-pin-unlock').focus();
        }
      }

      function crearTarjetaBoveda(item) {
        const icono = item.tipo === 'contrasena' ? '🔑' : item.tipo === 'tarjeta' ? '💳' : '📝';
        const sub   = item.tipo === 'contrasena' ? (item.usuario || '—')
        : item.tipo === 'tarjeta'    ? ('**** ' + (item.numero || '').slice(-4))
        : (item.contenido || '').substring(0, 30) + '…';

        // Wrapper swipe
        const wrapper = document.createElement('div');
        wrapper.style.cssText = 'position:relative;border-radius:var(--radius-sm);margin-bottom:6px;';

        // Fondo verde — editar (derecha)
        const editBg = document.createElement('div');
        editBg.style.cssText = 'position:absolute;inset:0;border-radius:var(--radius-sm);background:#2e9e5b;display:flex;align-items:center;justify-content:flex-start;padding:0 18px;font-size:13px;font-weight:600;color:#fff;opacity:0;pointer-events:none;z-index:0;transition:opacity .1s;';
        editBg.textContent = '✏️ Editar';
        wrapper.appendChild(editBg);

        // Fondo rojo — eliminar (izquierda)
        const delBg = document.createElement('div');
        delBg.style.cssText = 'position:absolute;inset:0;border-radius:var(--radius-sm);background:#e03e3e;display:flex;align-items:center;justify-content:flex-end;padding:0 18px;font-size:13px;font-weight:600;color:#fff;opacity:0;pointer-events:none;z-index:0;transition:opacity .1s;';
        delBg.textContent = '🗑️ Eliminar';
        wrapper.appendChild(delBg);

        // Item principal
        const el = document.createElement('div');
        el.className = 'boveda-item';
        el.style.cssText = 'position:relative;z-index:1;will-change:transform;touch-action:pan-y;margin-bottom:0;';
        el.innerHTML = `
          <div class="boveda-item-icon">${icono}</div>
          <div class="boveda-item-info">
            <div class="boveda-item-nombre">${item.nombre}</div>
            <div class="boveda-item-sub">${sub}</div>
      </div>`;
        el.onclick = () => bovedaVerItem(item);

        // Swipe logic
        let startX = 0, curX = 0, swiping = false;
        const MAX = 110;

        el.addEventListener('touchstart', e => {
          startX = e.touches[0].clientX; curX = 0; swiping = true;
          el.style.transition = '';
        }, { passive: true });

        el.addEventListener('touchmove', e => {
          if (!swiping) return;
          const dx = e.touches[0].clientX - startX;
          if (dx > 0) {
            curX = Math.min(dx, MAX);
            el.style.transform = `translateX(${curX}px)`;
            editBg.style.opacity = curX / MAX;
            delBg.style.opacity  = '0';
          } else {
            curX = Math.max(dx, -MAX);
            el.style.transform = `translateX(${curX}px)`;
            delBg.style.opacity  = Math.abs(curX) / MAX;
            editBg.style.opacity = '0';
          }
        }, { passive: true });

        el.addEventListener('touchend', () => {
          swiping = false;
          const activado = curX;
          curX = 0;
          el.style.transition = 'transform .2s ease';
          el.style.transform  = 'translateX(0)';
          editBg.style.opacity = '0';
          delBg.style.opacity  = '0';
          setTimeout(() => { el.style.transition = ''; }, 220);

          if (activado >= MAX * 0.72) {
            bovedaAbrirEditar(item);
          } else if (activado <= -MAX * 0.72) {
            bovedaEliminar(item.id);
          }
        });

        wrapper.appendChild(el);
        return wrapper;
      }

      function bovedaVerItem(item) {
        const body = document.getElementById('boveda-item-body');
        const titulo = document.getElementById('boveda-item-titulo');
        body.innerHTML = '';

        const icono = item.tipo === 'contrasena' ? '🔑' : item.tipo === 'tarjeta' ? '💳' : '📝';

        const campos = item.tipo === 'contrasena'
        ? [ ['Usuario', item.usuario], ['Contraseña', item.contrasena], ['URL', item.url], ['Notas', item.notas] ]
        : item.tipo === 'tarjeta'
        ? [ ['Title', item.nombre], ['Titular', item.titular], ['Número', item.numero], ['Vencimiento', item.vencimiento], ['CVV', item.cvv], ['PIN', item.pin], ['Notas', item.notas] ]
        : [ ['Contenido', item.contenido] ];

        campos.forEach(([label, val]) => {
          if (!val) return;
          const grupo = document.createElement('div');
          grupo.className = 'campo';
          grupo.style.marginBottom = '10px';
          const lbl = document.createElement('label');
          lbl.textContent = label;
          const valWrap = document.createElement('div');
          valWrap.className = 'boveda-campo-valor';
          const span = document.createElement('span');
          // Ocultar contraseñas/CVV/PIN por defecto
          const esSensible = ['Contraseña','CVV','PIN'].includes(label);
          if (label === 'Contenido') span.className = 'nota-contenido';
          span.textContent = esSensible ? '••••••••' : val;
          span.dataset.real = val;
          span.dataset.oculto = esSensible ? '1' : '0';
          const btnOjo = document.createElement('button');
          btnOjo.style.cssText = 'background:none;border:none;cursor:pointer;font-size:14px;padding:2px 4px;';
          btnOjo.textContent = esSensible ? '👁' : '📋';
          btnOjo.title = esSensible ? 'Mostrar/ocultar' : 'Copiar';
          btnOjo.onclick = () => {
            if (esSensible) {
              const oculto = span.dataset.oculto === '1';
              span.textContent = oculto ? span.dataset.real : '••••••••';
              span.dataset.oculto = oculto ? '0' : '1';
              btnOjo.textContent = oculto ? '🙈' : '👁';
            } else {
              // Número de tarjeta: copiar solo dígitos
              const toCopy = label === 'Número' ? val.replace(/\D/g,'') : val;
              navigator.clipboard.writeText(toCopy).then(() => { btnOjo.textContent = '✅'; setTimeout(() => btnOjo.textContent = '📋', 1500); });
            }
          };
          valWrap.appendChild(span);
          valWrap.appendChild(btnOjo);
          grupo.appendChild(lbl);
          grupo.appendChild(valWrap);
          body.appendChild(grupo);
        });

        // Ocultar footer de guardar (solo ver)
        const eNota = item.tipo === 'nota';
        document.getElementById('modal-boveda-item').style.setProperty('--boveda-item-h', eNota ? '70vh' : 'auto');
        document.querySelector('#modal-boveda-item .modal-box').style.maxHeight = eNota ? '70vh' : '88vh';
        document.querySelector('#modal-boveda-item .modal-body').style.flex = eNota ? '1' : '';
        document.querySelector('#modal-boveda-item .modal-body').style.overflowY = 'auto';
        if (eNota) {
          // Hacer el textarea de contenido más grande en vista
          setTimeout(() => {
            const ta = body.querySelector('.boveda-campo-valor span');
            if (ta) ta.style.whiteSpace = 'pre-wrap';
          }, 50);
        }
        document.querySelector('#modal-boveda-item .modal-footer').style.display = 'none';
        document.getElementById('modal-boveda-item').classList.add('visible');
      }

      function bovedaAbrirAgregar(tipo) {
        _bovedaTipo = tipo;
        const body  = document.getElementById('boveda-item-body');
        const titulo = document.getElementById('boveda-item-titulo');
        body.innerHTML = '';
        document.querySelector('#modal-boveda-item .modal-footer').style.display = 'flex';

        if (tipo === 'contrasena') {
          titulo.textContent = '🔑 Nueva contraseña';
          body.innerHTML = `
            <div class="campo"><label>Nombre del sitio</label><input id="bv-nombre" class="campo input" type="text" placeholder="Ej: Gmail"></div>
            <div class="campo"><label>URL</label><input id="bv-url" type="text" placeholder="https://…"></div>
            <div class="campo"><label>Usuario</label><input id="bv-usuario" type="text" placeholder="usuario@email.com"></div>
            <div class="campo"><label>Contraseña</label>
              <div style="display:flex;gap:6px;align-items:center;">
                <input id="bv-contrasena" type="password" placeholder="••••••••" style="flex:1;">
                <button type="button" id="bv-ojo-contrasena" style="background:none;border:1px solid var(--border);border-radius:var(--radius-xs);padding:6px 8px;cursor:pointer;font-size:14px;flex-shrink:0;" onclick="
                  const inp = document.getElementById('bv-contrasena');
                  const btn = document.getElementById('bv-ojo-contrasena');
                  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
                  else { inp.type = 'password'; btn.textContent = '👁'; }
                ">👁</button>
              </div>
            </div>
            <div class="campo"><label>Notas</label><input id="bv-notas" type="text" placeholder="Opcional"></div>`;
        } else if (tipo === 'tarjeta') {
          titulo.textContent = '💳 Nueva tarjeta';
          body.innerHTML = `
            <div class="campo"><label>Nombre / Banco</label><input id="bv-nombre" type="text" placeholder="Ej: Agrícola Visa"></div>
            <div class="campo"><label>Titular</label><input id="bv-titular" type="text" placeholder="Nombre en la tarjeta"></div>
            <div class="campo"><label>Número de tarjeta</label><input id="bv-numero" type="text" placeholder="**** **** **** ****" maxlength="22"></div>
            <div class="campo"><label>Vencimiento</label>
              <div style="display:flex;gap:8px;">
                <input id="bv-mes" type="text" placeholder="MM" maxlength="2" style="width:70px;text-align:center;" oninput="this.value=this.value.replace(/\D/g,'');if(this.value.length===2)document.getElementById('bv-anio').focus()">
                <span style="align-self:center;color:var(--text-hint);font-size:18px;font-weight:300;">/</span>
                <input id="bv-anio" type="text" placeholder="AA" maxlength="2" style="width:70px;text-align:center;" oninput="this.value=this.value.replace(/\D/g,'')">
      </div>
      </div>
            <div class="campo"><label>CVV</label><input id="bv-cvv" type="password" placeholder="•••" maxlength="4"></div>
            <div class="campo"><label>PIN</label><input id="bv-pin" type="password" placeholder="••••" maxlength="6"></div>
            <div class="campo"><label>Notas</label><input id="bv-notas" type="text" placeholder="Opcional"></div>`;
        } else {
          titulo.textContent = '📝 Nueva nota';
          body.innerHTML = `
            <div class="campo"><label>Título</label><input id="bv-nombre" type="text" placeholder="Título de la nota"></div>
            <div class="campo"><label>Contenido</label><textarea id="bv-contenido" style="min-height:220px;resize:vertical;width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:Inter,sans-serif;font-size:13px;color:var(--text);background:var(--surface-2);outline:none;box-sizing:border-box;" placeholder="Escribe tu nota segura…"></textarea></div>`;
        }

        // Aplicar estilos a los campos generados
        body.querySelectorAll('input, textarea').forEach(el => {
          if (el.id === 'bv-ojo-contrasena') return;
          const esPequeno  = ['bv-mes','bv-anio'].includes(el.id);
          const esContenido = el.id === 'bv-contenido';
          el.style.cssText = `${esPequeno ? '' : 'width:100%;'}padding:8px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:Inter,sans-serif;font-size:13px;color:var(--text);background:var(--surface-2);outline:none;box-sizing:border-box;${esContenido ? 'min-height:calc(50vh - 80px);resize:vertical;' : ''}`;
        });

        document.getElementById('modal-boveda-item').classList.add('visible');
        setTimeout(() => { const f = body.querySelector('input'); if(f) f.focus(); }, 120);
      }

      async function bovedaGuardarItem() {
        const nombre = document.getElementById('bv-nombre')?.value.trim();
        if (!nombre) { toast('⚠️ Ingresa un nombre'); return; }
        const enc   = await bovedaGetItems();
        let items   = [];
        if (enc && enc.buf) {
          try { items = await descifrar(_bovedaKey, enc.iv, enc.buf); } catch(e) {}
        }
        const editandoId = document.getElementById('modal-boveda-item').dataset.editandoId || '';
        document.getElementById('modal-boveda-item').dataset.editandoId = '';
        const id = editandoId || 'bv_' + Date.now();
        // Si editando, remover el anterior
        if (editandoId) items = items.filter(x => x.id !== editandoId);
        if (_bovedaTipo === 'contrasena') {
          items.push({ id, tipo: 'contrasena', nombre,
                      url:        document.getElementById('bv-url')?.value.trim() || '',
                      usuario:    document.getElementById('bv-usuario')?.value.trim() || '',
                      contrasena: document.getElementById('bv-contrasena')?.value || '',
                      notas:      document.getElementById('bv-notas')?.value.trim() || '' });
        } else if (_bovedaTipo === 'tarjeta') {
          const mes  = document.getElementById('bv-mes')?.value.trim().padStart(2,'0') || '';
          const anio = document.getElementById('bv-anio')?.value.trim() || '';
          const venc = mes && anio ? mes + '/' + anio : '';
          items.push({ id, tipo: 'tarjeta', nombre,
                      titular:     document.getElementById('bv-titular')?.value.trim() || '',
                      numero:      document.getElementById('bv-numero')?.value.trim() || '',
                      vencimiento: venc,
                      cvv:         document.getElementById('bv-cvv')?.value || '',
                      pin:         document.getElementById('bv-pin')?.value || '',
                      notas:       document.getElementById('bv-notas')?.value.trim() || '' });
        } else {
          items.push({ id, tipo: 'nota', nombre,
                      contenido: document.getElementById('bv-contenido')?.value.trim() || '' });
        }
        await bovedaGuardarCifrado(_bovedaKey, items);
        toast('✅ Guardado en bóveda');
        cerrarModal('modal-boveda-item');
        await bovedaMostrarContenido();
      }

      function bovedaAbrirEditar(item) {
        _bovedaTipo = item.tipo;
        bovedaAbrirAgregar(item.tipo);
        // Rellenar campos con datos existentes
        setTimeout(() => {
          const b = document.getElementById('boveda-item-body');
          if (!b) return;
          b.querySelector('#bv-nombre') && (b.querySelector('#bv-nombre').value = item.nombre || '');
          if (item.tipo === 'contrasena') {
            b.querySelector('#bv-url')        && (b.querySelector('#bv-url').value        = item.url || '');
            b.querySelector('#bv-usuario')    && (b.querySelector('#bv-usuario').value    = item.usuario || '');
            b.querySelector('#bv-contrasena') && (b.querySelector('#bv-contrasena').value = item.contrasena || '');
            b.querySelector('#bv-notas')      && (b.querySelector('#bv-notas').value      = item.notas || '');
          } else if (item.tipo === 'tarjeta') {
            b.querySelector('#bv-titular')    && (b.querySelector('#bv-titular').value    = item.titular || '');
            b.querySelector('#bv-numero')     && (b.querySelector('#bv-numero').value     = item.numero || '');
            if (item.vencimiento) {
              const [mm, aa] = item.vencimiento.split('/');
              b.querySelector('#bv-mes')  && (b.querySelector('#bv-mes').value  = mm || '');
              b.querySelector('#bv-anio') && (b.querySelector('#bv-anio').value = aa || '');
            }
            b.querySelector('#bv-cvv')  && (b.querySelector('#bv-cvv').value  = item.cvv || '');
            b.querySelector('#bv-pin')  && (b.querySelector('#bv-pin').value  = item.pin || '');
            b.querySelector('#bv-notas') && (b.querySelector('#bv-notas').value = item.notas || '');
          } else {
            b.querySelector('#bv-contenido') && (b.querySelector('#bv-contenido').value = item.contenido || '');
          }
          // Guardar id para actualizar en lugar de crear nuevo
          document.getElementById('modal-boveda-item').dataset.editandoId = item.id;
        }, 150);
      }

      async function bovedaEliminar(id) {
        if (!confirm('¿Eliminar este item de la bóveda?')) return;
        const enc  = await bovedaGetItems();
        let items  = [];
        if (enc && enc.buf) {
          try { items = await descifrar(_bovedaKey, enc.iv, enc.buf); } catch(e) {}
        }
        items = items.filter(x => x.id !== id);
        await bovedaGuardarCifrado(_bovedaKey, items);
        toast('🗑️ Eliminado');
        await bovedaMostrarContenido();
      }

      function bovedaBuscar(q) {
        _bovedaBusqueda = q;
        bovedaMostrarContenido();
      }

      function cerrarBoveda() {
        _bovedaBusqueda = '';
        document.getElementById('boveda-search-wrap').style.display = 'none';
        document.getElementById('modal-boveda').classList.remove('visible');
      }
      
      /* ── Google Passwords CSV ── */
      // toggleMenuGooglePass eliminado — menú movido a dentro de la bóveda

      async function exportarGooglePasswords() {
        cerrarMenus();
        document.getElementById('menu-gpass').style.display = 'none';
        if (!_bovedaKey) {
          toast('⚠️ Abre y desbloquea la bóveda primero');
          return;
        }
        const enc = await bovedaGetItems();
        let items = [];
        if (enc && enc.buf) {
          try { items = await descifrar(_bovedaKey, enc.iv, enc.buf); } catch(e) {
            toast('❌ Error al descifrar'); return;
          }
        }
        const contrasenas = items.filter(x => x.tipo === 'contrasena');
        if (!contrasenas.length) { toast('⚠️ No hay contraseñas para exportar'); return; }

        // Formato Google Passwords CSV
        const filas = ['name,url,username,password,note'];
        contrasenas.forEach(it => {
          const esc = v => '"' + (v || '').replace(/"/g, '""') + '"';
          filas.push([esc(it.nombre), esc(it.url), esc(it.usuario), esc(it.contrasena), esc(it.notas)].join(','));
        });
        const blob = new Blob([filas.join('\n')], { type: 'text/csv;charset=utf-8;' });
        const a    = document.createElement('a');
        a.href     = URL.createObjectURL(blob);
        a.download = 'Google_Passwords.csv';
        a.click();
        URL.revokeObjectURL(a.href);
        toast(`📤 ${contrasenas.length} contraseñas exportadas`);
      }

      function importarGooglePasswords() {
        cerrarMenus();
        document.getElementById('menu-gpass').style.display = 'none';
        if (!_bovedaKey) {
          toast('⚠️ Abre y desbloquea la bóveda primero');
          return;
        }
        document.getElementById('input-gpass').value = '';
        document.getElementById('input-gpass').click();
      }

      async function procesarCSVGoogle(input) {
        const file = input.files[0];
        if (!file) return;
        const texto = await file.text();
        const lineas = texto.split('\n').map(l => l.trim()).filter(l => l);
        if (!lineas.length) { toast('⚠️ CSV vacío'); return; }

        // Detectar cabecera
        const cabecera = lineas[0].toLowerCase();
        if (!cabecera.includes('name') && !cabecera.includes('url') && !cabecera.includes('username')) {
          toast('⚠️ Formato CSV no reconocido'); return;
        }

        // Parsear CSV respetando comillas
        function parsearFila(linea) {
          const cols = [];
          let actual = '', dentro = false;
          for (let i = 0; i < linea.length; i++) {
            const c = linea[i];
            if (c === '"') {
              if (dentro && linea[i+1] === '"') { actual += '"'; i++; }
              else dentro = !dentro;
            } else if (c === ',' && !dentro) {
              cols.push(actual); actual = '';
            } else {
              actual += c;
            }
          }
          cols.push(actual);
          return cols;
        }

        const headers = parsearFila(lineas[0]).map(h => h.toLowerCase().trim());
        const iName = headers.indexOf('name');
        const iUrl  = headers.indexOf('url');
        const iUser = headers.indexOf('username');
        const iPass = headers.indexOf('password');
        const iNote = headers.indexOf('note');

        // Cargar items existentes
        const enc  = await bovedaGetItems();
        let items  = [];
        if (enc && enc.buf) {
          try { items = await descifrar(_bovedaKey, enc.iv, enc.buf); } catch(e) {}
        }

        let importados = 0, duplicados = 0;
        for (let i = 1; i < lineas.length; i++) {
          const cols    = parsearFila(lineas[i]);
          const nombre  = iName >= 0 ? cols[iName]?.trim() : '';
          const url     = iUrl  >= 0 ? cols[iUrl]?.trim()  : '';
          const usuario = iUser >= 0 ? cols[iUser]?.trim() : '';
          const clave   = iPass >= 0 ? cols[iPass]?.trim() : '';
          if (!nombre && !url) continue;

          // Evitar duplicados por url+usuario
          const existe = items.some(x => x.tipo === 'contrasena' && x.url === url && x.usuario === usuario);
          if (existe) { duplicados++; continue; }

          const nota = iNote >= 0 ? cols[iNote]?.trim() : '';
          items.push({
            id:         'bv_' + Date.now() + '_' + i,
            tipo:       'contrasena',
            nombre:     nombre || url,
            url,
            usuario,
            contrasena: clave,
            notas:      nota
          });
          importados++;
        }

        await bovedaGuardarCifrado(_bovedaKey, items);
        toast(`📥 ${importados} importadas${duplicados ? ', ' + duplicados + ' duplicadas omitidas' : ''}`);
      }

    </script>
